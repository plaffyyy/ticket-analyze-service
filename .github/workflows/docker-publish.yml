name: Publish Docker image

# After Check succeeds on main: push :snapshot only.
# On GitHub Release published: push image :<tag> and deploy to server over SSH.
on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
  release:
    types:
      - published

jobs:
  push-image:
    name: Build and push
    runs-on: ubuntu-latest
    concurrency:
      group: docker-br-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: true
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name and tags
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "tags=${IMAGE}:snapshot" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  release-build-push-deploy:
    name: Release image, deploy, verify
    runs-on: ubuntu-latest
    concurrency:
      group: docker-release-${{ github.event.release.tag_name }}
      cancel-in-progress: true
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Image name and release tag
        run: |
          echo "IMAGE_LOWER=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_LOWER }}:${{ env.RELEASE_TAG }}

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_KEY}" ]; then
            echo "Missing repository secret DEPLOY_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing repository variable DEPLOY_HOST (VM IP or hostname)" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_ed25519
          chmod 600 ~/.ssh/deploy_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy on server
        run: |
          U="${DEPLOY_USER:-ubuntu}"
          ssh -i ~/.ssh/deploy_ed25519 -o IdentitiesOnly=yes \
            "${U}@${DEPLOY_HOST}" \
            "export IMAGE_REPO='${IMAGE_LOWER}' && bash /home/ubuntu/scripts/deploy-release.sh '${RELEASE_TAG}'"

      - name: Verify live workload uses new image
        run: |
          U="${DEPLOY_USER:-ubuntu}"
          ssh -i ~/.ssh/deploy_ed25519 -o IdentitiesOnly=yes \
            "${U}@${DEPLOY_HOST}" bash -s <<REMOTE
          set -euo pipefail
          TAG='${RELEASE_TAG}'
          REPO='${IMAGE_LOWER}'
          COLOR=\$(kubectl -n dealer get svc ticket-analyze-service -o jsonpath='{.spec.selector.color}')
          IMG=\$(kubectl -n dealer get deploy "ticket-analyze-service-\${COLOR}" -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Live color=\${COLOR} image=\${IMG}"
          case "\${IMG}" in
            "\${REPO}:\${TAG}") ;;
            *) echo "Expected image \${REPO}:\${TAG}, got \${IMG}" >&2; exit 1 ;;
          esac
          curl -sSf "http://127.0.0.1:30080/actuator/health" >/dev/null
          echo "Health OK on NodePort"
          REMOTE
