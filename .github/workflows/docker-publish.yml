name: Publish Docker image

# main: push :snapshot (+ :sha-<full_sha> for reuse). No full rebuild if that commit already exists in GHCR.
# release: retag existing :sha-<commit> to :<version> when the tag points at a commit we already built; else build.
on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  push-image:
    name: Build or retag snapshot
    runs-on: ubuntu-latest
    concurrency:
      group: docker-main-${{ github.sha }}
      cancel-in-progress: true
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout at push commit
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name and digest tag
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Reuse existing image for this commit or build
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
        run: |
          set -euo pipefail
          SRC="${IMAGE}:${SHA_TAG}"
          if docker buildx imagetools inspect "${SRC}" >/dev/null 2>&1; then
            echo "Image ${SRC} already exists — updating :snapshot pointer only."
            docker buildx imagetools create -t "${IMAGE}:snapshot" "${SRC}"
          else
            echo "No image for this commit yet — building and pushing."
            docker buildx build \
              --push \
              --tag "${IMAGE}:snapshot" \
              --tag "${SRC}" \
              .
          fi

  release-build-push-deploy:
    name: Release image, deploy, verify
    runs-on: ubuntu-latest
    concurrency:
      group: docker-release-${{ github.event.release.tag_name }}
      cancel-in-progress: true
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Image name, release tag, commit SHA
        run: |
          echo "IMAGE_LOWER=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reuse :sha-<commit> or build release image
        run: |
          set -euo pipefail
          SRC="${IMAGE_LOWER}:sha-${COMMIT_SHA}"
          DST="${IMAGE_LOWER}:${RELEASE_TAG}"
          if docker buildx imagetools inspect "${SRC}" >/dev/null 2>&1; then
            echo "Reusing ${SRC} → ${DST}"
            docker buildx imagetools create -t "${DST}" "${SRC}"
          else
            echo "No ${SRC} in registry — building ${DST}"
            docker buildx build \
              --push \
              --tag "${DST}" \
              --tag "${SRC}" \
              .
          fi

      - name: Check deploy configuration
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_KEY}" ]; then
            echo "Missing repository secret DEPLOY_SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing repository variable DEPLOY_HOST (VM IP or hostname)" >&2
            exit 1
          fi

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy on server
        run: |
          U="${DEPLOY_USER:-ubuntu}"
          scp \
            devops/scripts/deploy-release.sh \
            "${U}@${DEPLOY_HOST}:/home/ubuntu/scripts/deploy-release.sh"
          ssh \
            "${U}@${DEPLOY_HOST}" \
            "chmod +x /home/ubuntu/scripts/deploy-release.sh && export IMAGE_REPO='${IMAGE_LOWER}' && bash /home/ubuntu/scripts/deploy-release.sh '${RELEASE_TAG}'"

      - name: Verify live workload uses new image
        run: |
          U="${DEPLOY_USER:-ubuntu}"
          ssh \
            "${U}@${DEPLOY_HOST}" bash -s <<REMOTE
          set -euo pipefail
          TAG='${RELEASE_TAG}'
          REPO='${IMAGE_LOWER}'
          COLOR=\$(kubectl -n dealer get svc ticket-analyze-service -o jsonpath='{.spec.selector.color}')
          IMG=\$(kubectl -n dealer get deploy "ticket-analyze-service-\${COLOR}" -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Live color=\${COLOR} image=\${IMG}"
          case "\${IMG}" in
            "\${REPO}:\${TAG}") ;;
            *) echo "Expected image \${REPO}:\${TAG}, got \${IMG}" >&2; exit 1 ;;
          esac
          curl -sSf "http://127.0.0.1:30080/actuator/health" >/dev/null
          echo "Health OK on NodePort"
          REMOTE
