name: Publish Docker image

# Runs after CI succeeds; only pushes images for default branch (main/master) or release/* branches.
on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed

concurrency:
  group: docker-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  push-image:
    name: Build and push
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (
        github.event.workflow_run.head_branch == 'main' ||
        startsWith(github.event.workflow_run.head_branch, 'release/')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name and tags
        id: meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [ "$HEAD_BRANCH" = "main" ]; then
            echo "tags=${IMAGE}:snapshot" >> "$GITHUB_OUTPUT"
          else
            SUFFIX="${HEAD_BRANCH#release/}"
            SAFE=$(echo "$SUFFIX" | tr '/' '-')
            {
              echo 'tags<<EOF'
              echo "${IMAGE}:release-${SAFE}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
