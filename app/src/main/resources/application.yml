springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.dealer: INFO
    org.springframework.security: WARN

app:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:30}
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL_TOKENS:30}
      refill-period: ${RATE_LIMIT_AUTH_REFILL_PERIOD:PT1M}
      refill-strategy: ${RATE_LIMIT_AUTH_REFILL_STRATEGY:GREEDY}
    private-api:
      capacity: ${RATE_LIMIT_PRIVATE_CAPACITY:300}
      refill-tokens: ${RATE_LIMIT_PRIVATE_REFILL_TOKENS:300}
      refill-period: ${RATE_LIMIT_PRIVATE_REFILL_PERIOD:PT1M}
      refill-strategy: ${RATE_LIMIT_PRIVATE_REFILL_STRATEGY:GREEDY}
    public-api:
      capacity: ${RATE_LIMIT_PUBLIC_CAPACITY:120}
      refill-tokens: ${RATE_LIMIT_PUBLIC_REFILL_TOKENS:120}
      refill-period: ${RATE_LIMIT_PUBLIC_REFILL_PERIOD:PT1M}
      refill-strategy: ${RATE_LIMIT_PUBLIC_REFILL_STRATEGY:GREEDY}
  cache:
    enabled: ${CACHE_ENABLED:false}
    ttl:
      current-user: ${CACHE_TTL_CURRENT_USER:PT5M}
      group: ${CACHE_TTL_GROUP:PT10M}
      group-balance: ${CACHE_TTL_GROUP_BALANCE:PT1M}
      bill: ${CACHE_TTL_BILL:PT5M}
      group-bills: ${CACHE_TTL_GROUP_BILLS:PT2M}
  firebase:
    enabled: false
