spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dealer}
    username: ${DATABASE_USER:dealer}
    password: ${DATABASE_PASSWORD:dealer}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: ${REDIS_TIMEOUT:2s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      repositories:
        enabled: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /

security:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-that-must-be-changed-in-production-at-least-256-bits}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D

