services:
  app:
    build: .
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/dealer
      DATABASE_USER: dealer
      DATABASE_PASSWORD: dealer
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production-must-be-at-least-256-bits-long-secret-key
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy
#      redis:
#        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dealer
      POSTGRES_USER: dealer
      POSTGRES_PASSWORD: dealer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealer -d dealer"]
      interval: 5s
      timeout: 5s
      retries: 5

#  redis:
#    image: redis:7-alpine
#    ports:
#      - "6379:6379"
#    healthcheck:
#      test: ["CMD", "redis-cli", "ping"]
#      interval: 5s
#      timeout: 5s
#      retries: 5

volumes:
  pgdata:
