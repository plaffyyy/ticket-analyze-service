apiVersion: v1
kind: ConfigMap
metadata:
  name: ticket-analyze-service-config
  namespace: dealer
  labels:
    app.kubernetes.io/name: ticket-analyze-service
    app.kubernetes.io/part-of: dealer
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DATABASE_URL: "jdbc:postgresql://postgres.dealer.svc.cluster.local:5432/dealer"
  REDIS_URL: "redis://redis.dealer.svc.cluster.local:6379"
  CACHE_ENABLED: "true"
  FIREBASE_ENABLED: "false"
  # Expose actuator endpoints for k8s probes & prometheus scraping
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "never"
  MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
---
apiVersion: v1
kind: Secret
metadata:
  name: ticket-analyze-service-secrets
  namespace: dealer
  labels:
    app.kubernetes.io/name: ticket-analyze-service
    app.kubernetes.io/part-of: dealer
type: Opaque
stringData:
  DATABASE_USER: dealer
  DATABASE_PASSWORD: dealer-prod-change-me
  JWT_SECRET: change-me-in-production-must-be-at-least-256-bits-long-secret-key
